<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Management</title>
    <script defer src="app.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
     <h1>Home</h1>
    <nav id="menu">
    </nav>

<div class="container">
    <h2>Record an Expense</h2>
    
    <!-- Messages -->
    <div id="message"></div>
    <div id="errorMessage"></div>
    
    <form id="expenseForm">
        <!-- Category -->
        <label for="category">Category: <span class="required">*</span></label>
        <select id="category">
            <option value="">-- Select a Category --</option>
            <option value="food">Food</option>
            <option value="fuel">Fuel</option>
            <option value="leisure">Leisure</option>
            <option value="authorities">Authorities</option>
            <option value="other">Other</option>
        </select>

        <!-- Description -->
        <label for="description">Description:</label>
        <input type="text" id="description" placeholder="What did you spend on?">

        <!-- Amount -->
        <label for="amount">Amount: <span class="required">*</span></label>
        <input type="number" id="amount" placeholder="0.00" step="0.01" min="0">

        <!-- Date -->
        <label for="date">Date: <span class="required">*</span></label>
        <input type="date" id="date">

        <!-- Buttons -->
        <div class="button-group">
            <button type="submit" id="submitBtn">Add Expense</button>
            <button type="reset">Clear</button>
        </div>
    </form>
</div>

<!-- Expenses Table -->
<div class="container">
    <h2>Your Expenses</h2>
    <div id="noExpenses" class="no-expenses">No expenses yet. Add one above!</div>
    <table id="expensesTable" class="hidden">
        <thead>
            <tr>
                <th>Date</th>
                <th>Category</th>
                <th>Description</th>
                <th>Amount</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="expensesBody">
        </tbody>
    </table>
</div>


</body>
</html>
